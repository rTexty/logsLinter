changelog:
  exclude:
    labels:
      - skip-release-notes
      - github-actions

  categories:
    - title: Breaking Changes
      labels:
        - breaking-change

    - title: Features
      labels:
        - enhancement
        - feature

    - title: Fixes
      labels:
        - bug
        - fix

    - title: Security
      labels:
        - security

    - title: Documentation
      labels:
        - documentation

    - title: Maintenance
      labels:
        - chore
        - dependencies

    - title: Other Changes
      labels:
        - "*"
