name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -race -count=1

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          binary_name="logslinter"
          if [ "$GOOS" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          output_dir="dist/logslinter_${GOOS}_${GOARCH}"
          mkdir -p "$output_dir"

          go build -trimpath -ldflags="-s -w" -o "$output_dir/$binary_name" ./cmd/logslinter

      - name: Package tar.gz artifact
        if: matrix.archive == 'tar.gz'
        run: |
          archive_name="logslinter_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -C dist -czf "dist/$archive_name" "logslinter_${{ matrix.goos }}_${{ matrix.goarch }}"

      - name: Package zip artifact
        if: matrix.archive == 'zip'
        run: |
          archive_name="logslinter_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          cd dist
          zip -r "$archive_name" "logslinter_${{ matrix.goos }}_${{ matrix.goarch }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: logslinter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
